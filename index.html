<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Planner</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <aside id="sidebar">
        <div class="app-branding">
            <h1 class="app-title">Dynamic Planner</h1>
            <p class="app-subtitle">A drag-and-drop calendar planner</p>
            <p class="app-credits">Made with &hearts; by Nayan Shaji, with help of Gemini AI</p>
        </div>

        <div class="sidebar-header">
            <h2>Tasks</h2>
            <div class="header-actions">
                <button id="theme-toggle-btn" class="icon-btn theme-btn" title="Toggle Dark/Light Mode">
                    <svg id="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    <svg id="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                </button>
                <button id="import-btn" class="icon-btn import-btn" title="Import Data">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                </button>
                <button id="export-btn" class="icon-btn export-btn" title="Export Data (Save File)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                </button>
                <button id="export-ics-btn" class="icon-btn ics-btn" title="Export to Calendar (.ics)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                </button>
                <input type="file" id="import-file" accept=".json" style="display: none;">
            </div>
        </div>
        
        <div id="sidebar-content">
            <div id="task-list-container"></div>
            <div id="add-type-btn" class="add-btn">+ List item</div>
        </div>
    </aside>

    <main id="calendar-view">
        <header class="calendar-header">
            <button id="prev-month">◀</button>
            <h1 id="month-year-display"></h1>
            <button id="next-month">▶</button>
        </header>
        
        <div class="weekdays">
            <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div>
            <div>Thu</div><div>Fri</div><div>Sat</div>
        </div>
        
        <div id="calendar-grid">
            </div>
    </main>

    <div id="event-modal" class="modal hidden">
        <div class="modal-content">
            <h3 id="modal-title">Add Event</h3>
            <input type="text" id="event-name" placeholder="Event Name (e.g. Unit Test-1)">
            
            <div class="modal-form-group">
                <label for="event-type-select">Event Category:</label>
                <select id="event-type-select">
                    </select>
            </div>

            <div id="custom-type-fields" class="hidden">
                <input type="text" id="custom-type-name" placeholder="New Category Name (e.g. Holiday)">
                <div class="color-picker-group">
                    <label for="event-color">Day Color:</label>
                    <input type="color" id="event-color" value="#ffeb3b">
                </div>
            </div>
            
            <div class="modal-actions">
                <button id="delete-event-btn" class="danger-btn hidden">Delete</button>
                <div class="action-right">
                    <button id="cancel-event-btn" class="secondary-btn">Cancel</button>
                    <button id="save-event-btn">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
